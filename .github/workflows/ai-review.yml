# Reusable: gate a PR (evals + risk classification + AI review) and auto-merge GREEN PRs.
# Called by a target repo on pull_request events.
name: ai-review (reusable)

on:
  workflow_call:
    inputs:
      model:
        required: false
        type: string
        default: claude-sonnet-4-6
      marketplace_url:
        required: false
        type: string
        default: https://github.com/psumiya/neo.git
      run_evals:
        required: false
        type: boolean
        default: true
    secrets:
      anthropic_api_key:
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: read
  # claude-code-action exchanges an OIDC token for its GitHub App token at startup; without this
  # the review step dies before the agent runs ("Could not fetch an OIDC token").
  id-token: write

jobs:
  evals:
    # Hard, deterministic gate. A required status check; merge is impossible if this fails.
    if: ${{ inputs.run_evals }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Install Claude Code CLI
        # judge-kind cases shell out to `claude -p`; golden cases don't need it.
        run: npm install -g @anthropic-ai/claude-code
      - name: Run eval suite
        env:
          ANTHROPIC_API_KEY: ${{ secrets.anthropic_api_key }}
        run: |
          # Pull the evals runner from the harness so repos don't vendor it.
          git clone --depth 1 --branch v0.2.7 https://github.com/psumiya/neo.git /tmp/harness
          python3 /tmp/harness/plugins/evals/scripts/run_evals.py

  review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Classify risk + AI review + (auto-merge if GREEN)
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          # The whole pipeline is bot-driven: the PR being reviewed was opened by the claude App,
          # so the triggering actor is a bot and the action refuses to start without this.
          allowed_bots: claude
          plugin_marketplaces: ${{ inputs.marketplace_url }}
          plugins: risk-review@neo
          # SDK runs don't load the repo's .claude/settings.json; grant tools here. This lane is
          # the merge authority, so `gh pr merge --auto` stays allowed (unlike neo-build).
          claude_args: >-
            --model ${{ inputs.model }}
            --max-turns 25
            --allowedTools "Bash"
            --disallowedTools "Read(./.env),Read(./**/secrets/**)"
          prompt: |
            Run /risk-review:risk-classify on PR #${{ github.event.pull_request.number }} in
            ${{ github.repository }}.

            - Compute the deterministic tier with the classify.py script against .neo/config.yml.
            - Dispatch the risk-reviewer subagent on the diff for correctness/security defects.
            - Post a review comment with the tier, deterministic reasons, and AI findings, and apply
              the risk:green|yellow|red label.
            - If and only if the tier is GREEN and there are no blocking AI findings: approve the PR
              and enable squash auto-merge (`gh pr merge --squash --auto`). Branch protection still
              requires all checks (including the evals gate) to pass before it merges. If enabling
              auto-merge fails because the repo has no branch protection yet, verify this PR's
              checks are green (`gh pr checks`) and merge directly with `gh pr merge --squash`.
            - If YELLOW or RED: do not approve; assign the repo owner and leave the review for a human.
