# CI for neo itself. neo is shared infrastructure that consumer repos pin and trust, so its own
# changes must be tested before they land. Secretless: nothing here calls the Anthropic API.
name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r tests/requirements-dev.txt
      - run: pytest -q

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update -qq && sudo apt-get install -y shellcheck
      # Block on genuine errors; style/info warnings don't fail the build.
      - run: shellcheck --severity=error scripts/*.sh scripts/lib/*.sh local/*.sh plugins/*/scripts/*.sh

  workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: actionlint (pinned release)
        run: |
          VER=1.7.7
          curl -sSL "https://github.com/rhysd/actionlint/releases/download/v${VER}/actionlint_${VER}_linux_amd64.tar.gz" | tar xz actionlint
          ./actionlint .github/workflows/*.yml templates/target-repo/.github/workflows/*.yml

  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate marketplace + plugin manifests
        run: |
          python3 - <<'PY'
          import glob, json, sys
          ok = True
          mp = json.load(open(".claude-plugin/marketplace.json"))
          assert isinstance(mp.get("plugins"), list) and mp["plugins"], "marketplace.plugins missing/empty"
          for p in mp["plugins"]:
              assert p.get("name") and p.get("source"), f"bad marketplace entry: {p}"
          for f in glob.glob("plugins/*/.claude-plugin/plugin.json"):
              d = json.load(open(f))
              assert d.get("name") and d.get("version"), f"{f}: name/version required"
              print("ok:", f)
          print("marketplace + all plugin manifests valid")
          PY
      - name: CHANGELOG has an entry for the current VERSION
        run: |
          ver="$(tr -d '[:space:]' < VERSION)"
          grep -q "## \[${ver#v}\]" CHANGELOG.md \
            || { echo "VERSION=$ver but CHANGELOG.md has no '## [${ver#v}]' section — add release notes."; exit 1; }
          echo "changelog has a section for $ver"

  floating-refs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: main must carry floating self-references, never pinned ones
        run: |
          set -euo pipefail
          # Floating self-references are @main (neo's own workflows/plugins run main's tip) or a
          # floating major tag like @v0 (what templates ship — consumers track it by default). An
          # exact pin (@vX.Y.Z) baked into main means the release process silently no-op'd for that
          # ref (see scripts/cut-release.sh header): exact pins exist only on release commits.
          pinned_uses="$(grep -rnE 'psumiya/neo/\.github/workflows/[a-z0-9._-]+\.yml@' \
            --include='*.yml' .github/workflows templates plugins | grep -vE '@(main|v[0-9]+)$' || true)"
          # A `--branch <ref>` clone of neo is the same bug in `git clone` form.
          pinned_clone="$(grep -rnE 'git clone --depth 1 --branch [^ ]+ https://github\.com/psumiya/neo\.git' \
            --include='*.yml' --include='*.md' .github/workflows templates plugins || true)"
          # The marketplace `ref` in the template settings.json is the same bug in JSON form.
          pinned_json="$(grep -rnE '"ref":' \
            --include='*.json' templates plugins | grep -vE '"ref": *"(main|v[0-9]+)"' || true)"
          if [ -n "$pinned_uses" ] || [ -n "$pinned_clone" ] || [ -n "$pinned_json" ]; then
            echo "FAIL: main must carry floating self-references (@main or @v<major> / unpinned clone / ref: main or v<major>)."
            echo "Exact pinning happens only on the throwaway release commit cut by scripts/cut-release.sh."
            printf '%s\n%s\n%s\n' "$pinned_uses" "$pinned_clone" "$pinned_json"
            exit 1
          fi
          echo "ok: no exact-pinned self-references on main"

  installer-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dry-run the installer for both deploy targets
        run: |
          set -euo pipefail
          for target in none aws; do
            d="$(mktemp -d)"; git -C "$d" init -q
            out="$(scripts/neo-setup.sh --dir "$d" --deploy "$target" --non-interactive --dry-run)"
            echo "$out"
            echo "$out" | grep -q ".neo/config.yml" || { echo "FAIL($target): no config.yml"; exit 1; }
            echo "$out" | grep -q ".github/workflows/neo.yml" || { echo "FAIL($target): no neo.yml"; exit 1; }
            if [ "$target" = aws ]; then
              echo "$out" | grep -q "neo-deploy.yml" || { echo "FAIL(aws): no neo-deploy.yml"; exit 1; }
              echo "$out" | grep -q ".neo/deploy" || { echo "FAIL(aws): no .neo/deploy"; exit 1; }
            fi
            echo "smoke ok: $target"
          done
