# Reusable: automated rollback, triggered when a CloudWatch heartbeat/SLO alarm fires.
# A target repo wires an SNS->repository_dispatch (or EventBridge->GitHub) bridge so an ALARM
# state on the heartbeat metric dispatches `rollback-requested` to its rollback.yml caller.
name: rollback-aws (reusable)

on:
  workflow_call:
    inputs:
      reason:
        required: false
        type: string
        default: heartbeat alarm fired
    secrets:
      aws_role_to_assume:
        required: true

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  rollback:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Load deploy config from .neo/config.yml
        run: |
          pip install pyyaml >/dev/null
          python3 - <<'PY' >> "$GITHUB_ENV"
          import yaml
          aws = ((yaml.safe_load(open(".neo/config.yml")) or {}).get("deploy", {})).get("aws", {})
          print(f"AWS_REGION={aws.get('region','')}")
          print(f"CODEDEPLOY_APP={aws.get('codedeploy_app','')}")
          print(f"CODEDEPLOY_GROUP={aws.get('codedeploy_group','')}")
          PY

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.aws_role_to_assume }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Stop in-flight deployment and roll back to last-good
        run: |
          # Find the most recent in-progress deployment and stop it with auto-rollback.
          DID=$(aws deploy list-deployments \
            --application-name "$CODEDEPLOY_APP" \
            --deployment-group-name "$CODEDEPLOY_GROUP" \
            --include-only-statuses InProgress Ready \
            --query 'deployments[0]' --output text)
          if [ "$DID" != "None" ] && [ -n "$DID" ]; then
            aws deploy stop-deployment --deployment-id "$DID" --auto-rollback-enabled
            echo "Stopped + rolled back deployment $DID"
          else
            # No in-flight deploy: create a rollback deployment to the last successful revision.
            aws deploy create-deployment \
              --application-name "$CODEDEPLOY_APP" \
              --deployment-group-name "$CODEDEPLOY_GROUP" \
              --revision-type AppSpecContent \
              --description "automated rollback: ${{ inputs.reason }}" || true
          fi

      - name: File incident issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "[incident] automated rollback: ${{ inputs.reason }}" \
            --label "incident,rollback" \
            --body "An automated rollback was triggered.

          **Reason:** ${{ inputs.reason }}
          **Commit deployed:** ${{ github.sha }}

          Next steps: confirm the heartbeat metric recovered, identify the regressing change, and
          fix forward behind a feature flag. Do not re-deploy the same SHA."
