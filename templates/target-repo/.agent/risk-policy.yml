# Risk policy for this repo. Consumed by risk-review/scripts/classify.py.
# Conservative by design — widen `green_paths` / raise `max_lines_green` only as your observed
# rollback rate stays low.

# A change is GREEN (eligible for auto-merge) only if ALL hold:
#   - total added+removed lines <= max_lines_green
#   - every changed path matches one of green_paths
#   - no changed path matches blocked_paths
# Anything touching blocked_paths is RED (human review + protected-env approval).
# Everything else is YELLOW (human review).

max_lines_green: 80

green_paths:
  - "docs/**"
  - "**/*.md"
  - "config/flags/**"
  - "src/copy/**"          # user-facing strings
  # - "src/utils/format/**"  # example: widen as confidence grows

blocked_paths:
  - "**/migrations/**"
  - "**/schema.*"
  - "**/*.sql"
  - "**/auth/**"
  - "**/billing/**"
  - "**/payments/**"
  - "infra/**"
  - "terraform/**"
  - "**/Dockerfile"
  - "deploy/**"
  - "**/.github/workflows/**"
