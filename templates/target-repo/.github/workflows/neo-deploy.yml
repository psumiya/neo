# neo deploy adapter (opt-in) — added by `neo-setup` only when deploy.target is `aws`.
# Deploys on merge to main: blue-green canary via CodeDeploy, watched by the heartbeat metric.
# All parameters are read from .neo/config.yml by the reusable workflow, so this caller stays thin.
name: neo-deploy

on:
  push:
    branches: [main]
  # CloudWatch heartbeat alarm -> SNS -> repository_dispatch bridges to this event.
  repository_dispatch:
    types: [rollback-requested]

jobs:
  deploy:
    if: github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
    uses: psumiya/neo/.github/workflows/deploy.yml@v0.2.8
    secrets:
      aws_role_to_assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

  rollback:
    if: github.event_name == 'repository_dispatch'
    permissions:
      contents: read
      issues: write
      id-token: write
    uses: psumiya/neo/.github/workflows/rollback.yml@v0.2.8
    with:
      reason: ${{ github.event.client_payload.reason || 'heartbeat alarm fired' }}
    secrets:
      aws_role_to_assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
