# Caller: automated rollback. Triggered by a heartbeat/SLO CloudWatch alarm via
# SNS -> repository_dispatch(event_type: rollback-requested). See CLAUDE.md for the bridge setup.
name: rollback

on:
  repository_dispatch:
    types: [rollback-requested]

jobs:
  rollback:
    uses: sumiya/agent-harness/.github/workflows/rollback.yml@main
    with:
      aws_region: us-east-1
      codedeploy_app: my-app
      codedeploy_group: my-app-dg
      reason: ${{ github.event.client_payload.reason || 'heartbeat alarm fired' }}
    secrets:
      aws_role_to_assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
